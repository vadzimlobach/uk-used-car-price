run_name: "rf_baseline"

log_level: "INFO"

random_state: 42

model_type: "rf"

data:
  input_path: "data/processed/processed.csv"
  target: "price"

model:
  rf:
    params:
      n_estimators: 300
      max_depth: 20
      min_samples_split: 5
      min_samples_leaf: 2
      n_jobs: -1
  gb:
    params:
      max_depth: None
      learning_rate: 0.1
      max_iter: 300
  log_target: False

cv:
  n_splits: 5
  shuffle: True

artifacts_dir: "artifacts/runs"

analysis:
  save_figures: True