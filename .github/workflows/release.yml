name: Release Docker image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }} .
          docker tag ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }} ghcr.io/${{ github.repository }}:latest

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          docker push ghcr.io/${{ github.repository }}:latest