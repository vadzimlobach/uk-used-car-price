name: CI

on:
    push:
    pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
        
            - name: Set up Python
              uses: actions/setup-python@v5.1.0
              with: 
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: |
                    requirements.txt
                    pyproject.toml
            
            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run format check
              run: make format-check
            
            - name: Run lint
              run: make lint
    
    test: 
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
        
            - name: Set up Python
              uses: actions/setup-python@v5.1.0
              with: 
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: |
                    requirements.txt
                    pyproject.toml
            
            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install dependencies
              run: pip install -r requirements.txt
            
            - name: Run tests
              run: make test
              
    docker:
      runs-on: ubuntu-latest
      needs: [lint, test]

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5.1.0
          with:
            python-version: "3.11"
            cache: "pip"
            cache-dependency-path: |
              requirements.txt
              pyproject.toml
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build Docker image
          run: make docker-build

        - name: Preprocess fixture dataset
          run: |
            python -m src.preprocess \
              --in tests/fixtures/raw_small.csv \
              --out data/processed/processed.csv \
              --target price


        - name: Train model for docker smoke test
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            make train
        
        - name: Run Docker smoke test
          run: |
            docker run --rm \
              -v "${{ github.workspace }}/artifacts:/app/artifacts" \
              -v "${{ github.workspace }}/tests/fixtures:/app/fixtures" \
              car-price \
              --input /app/fixtures/sample_input.json

