name: CI

on:
    push:
    pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
        
            - name: Set up Python
              uses: actions/setup-python@v5.1.0
              with: 
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: |
                    requirements.txt
                    pyproject.toml
            
            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run format check
              run: make format-check
            
            - name: Run lint
              run: make lint
    
    test: 
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
        
            - name: Set up Python
              uses: actions/setup-python@v5.1.0
              with: 
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: |
                    requirements.txt
                    pyproject.toml
            
            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install dependencies
              run: pip install -r requirements.txt
            
            - name: Run tests
              run: make test
              
    docker:
      runs-on: ubuntu-latest
      needs: [lint, test]

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5.1.0
          with:
            python-version: "3.11"
            cache: "pip"
            cache-dependency-path: |
              requirements.txt
              pyproject.toml
        
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install .
            pip install .[dev,train]
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build Docker image
          run: make docker-build

        - name: Start Docker container
          run: |
            docker run -d --name car-price-api \
            -p 8000:8000 \
            -e MODEL_PATH=/app/artifacts/runs/test_run/model.joblib \
            -v "${{ github.workspace }}/tests/artifacts:/app/artifacts" \
            car-price-api

        - name: Wait for health endpoint
          run: |
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8000/health; then
                exit 0
              fi
              sleep 2
              done
              docker logs car-price-api
              exit 1

        - name: Run Docker smoke test
          run: |
            curl -fsS -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            --data @tests/fixtures/sample_input.json

        - name: Show container logs on failure
          if: failure()
          run: docker logs car-price-api

